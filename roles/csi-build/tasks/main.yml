---
- name: Set CSI image name
  ansible.builtin.set_fact:
    csi_image_name: "{{ 'manila-csi-plugin' if csi_driver == 'manila' else 'cinder-csi-plugin' }}"

- name: Get DevStack VM IP
  ansible.builtin.shell:
    cmd: ip -4 addr show scope global | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | grep -v '^169\.254\.' | head -1
  register: devstack_ip
  changed_when: false

- name: Set registry URL
  ansible.builtin.set_fact:
    registry_url: "localhost:{{ registry_port }}"
    remote_registry_url: "{{ devstack_ip.stdout | trim }}:{{ registry_port }}"

# Build on VM
- name: Build on VM
  when: build_on_vm | default(false) | bool
  block:
    - name: Install build dependencies on VM
      ansible.builtin.apt:
        name:
          - make
          - golang-go
          - gcc
          - docker-buildx
        state: present

    - name: Create CPO archive locally
      ansible.builtin.command:
        cmd: >-
          tar czf /tmp/cpo-source.tar.gz
          --exclude=.git --exclude=vendor
          -C {{ cpo_source_dir }} .
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Copy CPO archive to VM
      ansible.builtin.copy:
        src: /tmp/cpo-source.tar.gz
        dest: /tmp/cpo-source.tar.gz
        mode: "0644"

    - name: Extract CPO source on VM
      ansible.builtin.shell:
        cmd: |
          mkdir -p /tmp/cloud-provider-openstack
          tar xzf /tmp/cpo-source.tar.gz -C /tmp/cloud-provider-openstack
      changed_when: true

    - name: Build CSI image on VM
      ansible.builtin.command:
        cmd: "make build-local-image-{{ csi_image_name }}"
        chdir: /tmp/cloud-provider-openstack
      environment:
        CONTAINER_ENGINE: "{{ container_engine }}"
        REGISTRY: "{{ registry_url }}"
        VERSION: "{{ csi_image_version }}"
      changed_when: true

    - name: Push image to local registry
      ansible.builtin.shell:
        cmd: "{{ container_engine }} push {{ registry_url }}/{{ csi_image_name }}:{{ csi_image_version }}"
      changed_when: true

# Build locally and push
- name: Build locally and push
  when: not (build_on_vm | default(false) | bool)
  block:
    - name: Build CSI image locally
      ansible.builtin.command:
        cmd: "make build-local-image-{{ csi_image_name }}"
        chdir: "{{ cpo_source_dir }}"
      environment:
        CONTAINER_ENGINE: "{{ container_engine }}"
        REGISTRY: "{{ remote_registry_url }}"
        VERSION: "{{ csi_image_version }}"
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Push CSI image to registry
      ansible.builtin.command:
        cmd: >-
          {{ container_engine }} push
          {{ '--tls-verify=false' if container_engine == 'podman' else '' }}
          {{ remote_registry_url }}/{{ csi_image_name }}:{{ csi_image_version }}
      delegate_to: localhost
      become: false
      changed_when: true
