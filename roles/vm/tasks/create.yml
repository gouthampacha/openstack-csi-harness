---
- name: Read SSH public key
  ansible.builtin.slurp:
    src: "{{ ssh_public_key }}"
  delegate_to: localhost
  become: false
  register: ssh_key_data

- name: Set SSH key content fact
  ansible.builtin.set_fact:
    ssh_public_key_content: "{{ ssh_key_data.content | b64decode | trim }}"

- name: Ensure image cache directory exists
  ansible.builtin.file:
    path: "{{ vm_image_cache_dir }}"
    state: directory
    mode: "0755"

- name: Download cloud image
  ansible.builtin.get_url:
    url: "{{ vm_image_url }}"
    dest: "{{ vm_image_cache_dir }}/{{ vm_image_url | basename }}"
    mode: "0644"

- name: Create VM disk backed by cloud image
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2
      -b {{ vm_image_cache_dir }}/{{ vm_image_url | basename }}
      -F qcow2
      {{ vm_image_cache_dir }}/{{ vm_name }}.qcow2
      {{ vm_disk_gb }}G
    creates: "{{ vm_image_cache_dir }}/{{ vm_name }}.qcow2"

- name: Create cloud-init directory
  ansible.builtin.file:
    path: "/tmp/{{ vm_name }}-cloud-init"
    state: directory
    mode: "0755"

- name: Render cloud-init user-data
  ansible.builtin.template:
    src: user-data.j2
    dest: "/tmp/{{ vm_name }}-cloud-init/user-data"
    mode: "0644"

- name: Create cloud-init meta-data
  ansible.builtin.copy:
    content: |
      instance-id: {{ vm_name }}
      local-hostname: {{ vm_name }}
    dest: "/tmp/{{ vm_name }}-cloud-init/meta-data"
    mode: "0644"

- name: Create cloud-init ISO
  ansible.builtin.command:
    cmd: >-
      genisoimage -output {{ vm_image_cache_dir }}/{{ vm_name }}-cidata.iso
      -volid cidata -joliet -rock
      /tmp/{{ vm_name }}-cloud-init/user-data
      /tmp/{{ vm_name }}-cloud-init/meta-data
    creates: "{{ vm_image_cache_dir }}/{{ vm_name }}-cidata.iso"

- name: Create VM with virt-install
  ansible.builtin.command:
    cmd: >-
      virt-install
      --name {{ vm_name }}
      --memory {{ vm_memory_mb }}
      --vcpus {{ vm_vcpus }}
      --disk {{ vm_image_cache_dir }}/{{ vm_name }}.qcow2,format=qcow2
      --disk {{ vm_image_cache_dir }}/{{ vm_name }}-cidata.iso,device=cdrom
      --os-variant {{ vm_os_variant }}
      --network network={{ vm_network }}
      --graphics none
      --noautoconsole
      --import
  register: virt_install_result
  changed_when: virt_install_result.rc == 0

- name: Wait for VM to get an IP address
  ansible.builtin.shell:
    cmd: virsh domifaddr {{ vm_name }} | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}'
  register: vm_ip_result
  until: vm_ip_result.rc == 0 and vm_ip_result.stdout | length > 0
  retries: 30
  delay: 10
  changed_when: false

- name: Set VM IP fact
  ansible.builtin.set_fact:
    vm_ip: "{{ vm_ip_result.stdout | trim }}"

- name: Display VM IP
  ansible.builtin.debug:
    msg: "VM {{ vm_name }} is running at {{ vm_ip }}"

- name: Wait for SSH to become available
  ansible.builtin.wait_for:
    host: "{{ vm_ip }}"
    port: 22
    delay: 5
    timeout: 300

- name: Add VM to devstack group
  ansible.builtin.add_host:
    name: "{{ vm_name }}"
    ansible_host: "{{ vm_ip }}"
    ansible_user: ubuntu
    groups: devstack
