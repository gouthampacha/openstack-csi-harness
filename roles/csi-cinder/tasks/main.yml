---
- name: Install VolumeSnapshot CRDs
  ansible.builtin.command:
    cmd: "kubectl apply -f {{ item }}"
  environment:
    KUBECONFIG: "{{ kubeconfig | default('/etc/rancher/k3s/k3s.yaml') }}"
  loop:
    - https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/master/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml
    - https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/master/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml
    - https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/master/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml
  changed_when: true

- name: Get DevStack VM IP
  ansible.builtin.shell:
    cmd: ip -4 addr show scope global | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | head -1
  register: devstack_ip_cinder
  changed_when: false

- name: Create cloud-config secret
  ansible.builtin.shell:
    cmd: |
      kubectl create secret generic cloud-config \
        --namespace kube-system \
        --from-literal=cloud.conf="$(cat <<CLOUDEOF
      [Global]
      auth-url=http://{{ devstack_ip_cinder.stdout | trim }}/identity
      username=admin
      password=password
      domain-name=Default
      tenant-name=admin
      region=RegionOne

      [BlockStorage]
      bs-version=v3
      CLOUDEOF
      )" --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: "{{ kubeconfig | default('/etc/rancher/k3s/k3s.yaml') }}"
  changed_when: true

- name: Add cloud-provider-openstack Helm repo
  ansible.builtin.command:
    cmd: helm repo add cpo https://kubernetes.github.io/cloud-provider-openstack
  changed_when: true
  failed_when: false

- name: Install Cinder CSI via Helm
  ansible.builtin.command:
    cmd: >-
      helm install cinder-csi cpo/openstack-cinder-csi
      --namespace kube-system
      --set csi.plugin.image.repository=localhost:{{ registry_port }}/k8scloudprovider/cinder-csi-plugin
      --set csi.plugin.image.tag={{ csi_image_version }}
      --set csi.plugin.image.pullPolicy=IfNotPresent
      --set secret.enabled=true
  environment:
    KUBECONFIG: "{{ kubeconfig | default('/etc/rancher/k3s/k3s.yaml') }}"
  changed_when: true

- name: Wait for Cinder CSI pods to be running
  ansible.builtin.command:
    cmd: kubectl get pods -n kube-system -l app=openstack-cinder-csi -o jsonpath='{.items[*].status.phase}'
  environment:
    KUBECONFIG: "{{ kubeconfig | default('/etc/rancher/k3s/k3s.yaml') }}"
  register: cinder_pods
  until: "'Running' in cinder_pods.stdout"
  retries: 30
  delay: 10
  changed_when: false
