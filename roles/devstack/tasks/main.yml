---
- name: Create stack user
  ansible.builtin.user:
    name: "{{ devstack_user }}"
    shell: /bin/bash
    home: /opt/stack
    create_home: true

- name: Grant stack user passwordless sudo
  ansible.builtin.copy:
    content: "{{ devstack_user }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ devstack_user }}"
    mode: "0440"

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - git
      - python3-pip
      - python3-dev
      - build-essential
      - libssl-dev
      - libffi-dev
      - bridge-utils
      - iproute2
    state: present
    update_cache: true

- name: Clone DevStack
  ansible.builtin.git:
    repo: https://github.com/openstack/devstack.git
    dest: "{{ devstack_workdir }}"
    version: "{{ devstack_branch }}"
  become_user: "{{ devstack_user }}"

- name: Get local IP address
  ansible.builtin.shell:
    cmd: ip -4 addr show scope global | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | grep -v '^169\.254\.' | head -1
  register: local_ip
  changed_when: false

- name: Set local IP fact
  ansible.builtin.set_fact:
    local_ip_address: "{{ local_ip.stdout | trim }}"

- name: Render local.conf
  ansible.builtin.template:
    src: local.conf.j2
    dest: "{{ devstack_workdir }}/local.conf"
    owner: "{{ devstack_user }}"
    group: "{{ devstack_user }}"
    mode: "0644"

- name: Check if DevStack is already installed
  ansible.builtin.shell:
    cmd: |
      source {{ devstack_workdir }}/openrc admin admin
      openstack endpoint list -f json
    executable: /bin/bash
  become_user: "{{ devstack_user }}"
  environment:
    HOME: /opt/stack
  register: devstack_check
  changed_when: false
  failed_when: false

- name: Run stack.sh
  ansible.builtin.command:
    cmd: "{{ devstack_workdir }}/stack.sh"
    chdir: "{{ devstack_workdir }}"
  become_user: "{{ devstack_user }}"
  environment:
    HOME: /opt/stack
  timeout: 5400
  when: devstack_check.rc != 0

- name: Fix libvirt qemu permissions for nested virtualization
  when: "'nova' in devstack_services"
  ansible.builtin.shell:
    cmd: |
      if [ -f /etc/libvirt/qemu.conf ]; then
        sed -i 's/^#\?user = .*/user = "root"/' /etc/libvirt/qemu.conf
        sed -i 's/^#\?group = .*/group = "root"/' /etc/libvirt/qemu.conf
        systemctl restart libvirtd
      fi
    executable: /bin/bash
  changed_when: true

- name: Delete legacy Manila endpoints (gophercloud v2 compatibility)
  when: "'manila' in devstack_services"
  block:
    - name: Source admin credentials and get shared-file-system endpoints
      ansible.builtin.shell:
        cmd: |
          source {{ devstack_workdir }}/openrc admin admin
          openstack endpoint list --service shared-file-system -f json
        executable: /bin/bash
      register: manila_endpoints
      changed_when: false

    - name: Remove shared-file-system endpoints (use sharev2 instead)
      ansible.builtin.shell:
        cmd: |
          source {{ devstack_workdir }}/openrc admin admin
          openstack endpoint delete {{ item }}
        executable: /bin/bash
      loop: "{{ (manila_endpoints.stdout | from_json) | map(attribute='ID') | list }}"
      when: manila_endpoints.stdout | from_json | length > 0
      changed_when: true

- name: Create default Manila share type
  when: "'manila' in devstack_services"
  ansible.builtin.shell:
    cmd: |
      source {{ devstack_workdir }}/openrc admin admin
      existing=$(manila type-list --columns id --format value 2>/dev/null | wc -l)
      if [ "$existing" -eq 0 ]; then
        manila type-create default false
        manila type-key default set \
          snapshot_support=True \
          create_share_from_snapshot_support=True \
          revert_to_snapshot_support=True \
          mount_snapshot_support=True
      fi
    executable: /bin/bash
  changed_when: true

- name: Set up fake metadata service for CSI node registration
  block:
    - name: Add metadata link-local IP
      ansible.builtin.command:
        cmd: ip addr add 169.254.169.254/32 dev lo
      register: metadata_ip
      changed_when: metadata_ip.rc == 0
      failed_when: false

    - name: Create fake metadata directory
      ansible.builtin.file:
        path: /var/www/html/openstack/latest
        state: directory
        mode: "0755"

    - name: Generate fake metadata JSON
      ansible.builtin.shell:
        cmd: |
          printf '{"uuid": "%s", "name": "%s", "availability_zone": "nova"}' \
            "$(cat /etc/machine-id)" "$(hostname)" \
            > /var/www/html/openstack/latest/meta_data.json
      changed_when: true
